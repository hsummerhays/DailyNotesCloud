services:
  db:
    image: postgres:16-alpine
    container_name: dailynotescloud-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dailynotescloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dailynotescloud-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/dailynotescloud?schema=public
      - CORS_ORIGIN=http://localhost:3000
      # Local-dev-only value, fine to commit. Never reuse in a real deployment.
      - JWT_SECRET=local-dev-jwt-secret-do-not-use-in-production
      # Leave unset to keep Google Sign-In disabled (fails closed with 503).
      - GOOGLE_CLIENT_ID=
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dailynotescloud-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      # Public OAuth client ID (not a secret). Leave unset to hide the
      # Google Sign-In button -- the backend disables that route too.
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=
    depends_on:
      - backend

volumes:
  pgdata:
