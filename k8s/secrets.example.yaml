# Template only. Copy to k8s/secrets.yaml, fill in real values, then:
#   kubectl apply -f k8s/secrets.yaml
# k8s/secrets.yaml is gitignored -- never commit real credentials.
#
# In production, prefer sourcing this from Secret Manager (e.g. via the
# Secret Manager CSI driver or External Secrets Operator) instead of a
# plain Kubernetes Secret checked out on a developer's machine.
apiVersion: v1
kind: Secret
metadata:
  name: dailynotescloud-backend-secrets
  namespace: default
type: Opaque
stringData:
  DATABASE_URL: "postgresql://YOUR_DB_USER:YOUR_DB_PASSWORD@127.0.0.1:5432/dailynotescloud?schema=public"
  # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
  JWT_SECRET: "YOUR_RANDOM_JWT_SECRET"
