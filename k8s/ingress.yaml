apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: dailynotescloud-frontend-config
  namespace: default
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dailynotescloud-ingress
  namespace: default
  annotations:
    # Uses GKE's HTTP(S) Load Balancer
    kubernetes.io/ingress.class: "gce"
    # Kept on so the load balancer stays reachable over HTTP while the
    # managed certificate provisions; the FrontendConfig below redirects
    # all HTTP traffic to HTTPS once it's serving.
    kubernetes.io/ingress.allow-http: "true"
    networking.gke.io/managed-certificates: "dailynotescloud-cert"
    networking.gke.io/v1beta1.FrontendConfig: "dailynotescloud-frontend-config"
spec:
  rules:
    - http:
        paths:
          # Route backend API requests
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: dailynotescloud-backend-service
                port:
                  number: 5000

          # Route backend health checks
          - path: /health
            pathType: Exact
            backend:
              service:
                name: dailynotescloud-backend-service
                port:
                  number: 5000

          # Route all other traffic to the Next.js frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dailynotescloud-frontend-service
                port:
                  number: 3000
