apiVersion: apps/v1
kind: Deployment
metadata:
  name: dailynotescloud-frontend
  namespace: default
  labels:
    app: dailynotescloud-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dailynotescloud-frontend
  template:
    metadata:
      labels:
        app: dailynotescloud-frontend
    spec:
      serviceAccountName: dailynotescloud-frontend-sa
      containers:
        - name: frontend
          image: gcr.io/YOUR_GCP_PROJECT/dailynotescloud-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            # Point to the public domain or external load balancer IP if needed.
            # When routed through the Ingress, relative API calls can also be used.
            - name: NEXT_PUBLIC_API_URL
              value: ""
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dailynotescloud-frontend-service
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: dailynotescloud-frontend
